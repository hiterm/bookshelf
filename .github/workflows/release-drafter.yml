name: Release Drafter

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  update_release_draft:
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: release-drafter/release-drafter@5de93583980a40bd78603b6dfdcda5b4df377b32 # v7.2.0
        id: release_drafter
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Update package.json
        env:
          TAG_NAME: ${{ steps.release_drafter.outputs.tag_name }}
        run: |
          tag=$TAG_NAME
          npm --no-git-tag-version version "${tag#v}"
        continue-on-error: true
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          commit-message: Bump version to ${{ steps.release_drafter.outputs.tag_name }}
          branch: chore/bump-version
          title: "chore: bump version to ${{ steps.release_drafter.outputs.tag_name }}"
          body: |
            Automated version bump from Release Drafter
