name: Release Drafter

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  update_release_draft:
    permissions:
      contents: write
      pull-requests: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: release-drafter/release-drafter@139054aeaa9adc52ab36ddf67437541f039b88e2 # v7.1.1
        id: release_drafter
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Update package.json
        run: |
          tag=${{ steps.release_drafter.outputs.tag_name }}
          npm --no-git-tag-version version ${tag#v}
        continue-on-error: true
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8.1.0
        with:
          commit-message: Bump version to ${{ steps.release_drafter.outputs.tag_name }}
          branch: chore/bump-version
          title: "chore: bump version to ${{ steps.release_drafter.outputs.tag_name }}"
          body: |
            Automated version bump from Release Drafter
