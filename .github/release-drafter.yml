name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"
categories:
  - title: "Features"
    labels:
      - "feature"
      - "enhancement"
  - title: "Bug Fixes"
    labels:
      - "fix"
      - "bugfix"
      - "bug"
  - title: "Maintenance"
    label: "chore"
autolabeler:
  - label: "chore"
    files:
      - "*.md"
      - "*.yml"
    branch:
      - '/docs{0,1}\/.+/'
  - label: "bug"
    branch:
      - '/fix\/.+/'
    title:
      - "/fix/i"
  - label: "enhancement"
    branch:
      - '/feature\/.+/'
    body:
      - "/JIRA-[0-9]{1,4}/"
version-resolver:
  major:
    labels:
      - "bump-major"
  minor:
    labels:
      - "bump-minor"
  patch:
    labels:
      - "bump-patch"
  default: patch
template: |
  $CHANGES
